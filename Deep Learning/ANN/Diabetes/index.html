<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diabetes Prediction</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        input, button { margin: 5px 0; padding: 5px; width: 200px; }
        #result { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Diabetes Prediction App</h2>
    <form id="diabetesForm">
        <input type="number" name="pregnancies" placeholder="Pregnancies" required><br>
        <input type="number" name="glucose" placeholder="Glucose" required><br>
        <input type="number" name="bloodpressure" placeholder="Blood Pressure" required><br>
        <input type="number" name="skinthickness" placeholder="Skin Thickness" required><br>
        <input type="number" name="insulin" placeholder="Insulin" required><br>
        <input type="number" step="0.1" name="bmi" placeholder="BMI" required><br>
        <input type="number" step="0.01" name="diabetespedigree" placeholder="Diabetes Pedigree" required><br>
        <input type="number" name="age" placeholder="Age" required><br>
        <button type="submit">Predict</button>
    </form>

    <div id="result"></div>

    <script>
        const form = document.getElementById('diabetesForm');
        const resultDiv = document.getElementById('result');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(form);
            const data = {};
            formData.forEach((value, key) => { data[key] = isNaN(value) ? value : parseFloat(value); });

            try {
                const response = await fetch('http://127.0.0.1:8000/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                resultDiv.textContent = result.message;
            } catch (error) {
                resultDiv.textContent = 'Error connecting to API';
                console.error(error);
            }
        });
    </script>
</body>
</html>
